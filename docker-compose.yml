version: "3.8"

services:
  cloudflare-tunnel-gui:
    build: .
    container_name: cf-tunnel-gui
    ports:
      - "8888:8000"
    volumes:
      - ${XDG_RUNTIME_DIR:-/run/user/1000}/podman/podman.sock:/run/podman/podman.sock
      - ./config:/app/config
    environment:
      - CSRF_SECRET=${CSRF_SECRET:-}
      - PODMAN_SOCKET_PATH=unix:///run/podman/podman.sock
    restart: unless-stopped
